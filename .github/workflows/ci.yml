name: ci

# Fast and honest: syntax, contracts, and sandboxed unit suites on both platforms
# we claim to support. Nothing here downloads the voice model or plays audio —
# that last inch stays a human test, and the README says so.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: run the suite
        run: PYTHON=python3 tests/run.sh
